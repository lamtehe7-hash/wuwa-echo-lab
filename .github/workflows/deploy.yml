name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Gate trước deploy (review 16/07): CI từng build+deploy mù, 165+ test chỉ chạy tay local
      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # Gate E2E 78 bước (review 19/07 backlog #5): e2e-ui.mjs nói CDP thuần nên chạy thẳng trên
      # google-chrome có sẵn của runner ubuntu — không cần playwright. SLEEP_SCALE=2 vì CI chậm.
      - name: E2E (chrome headless)
        env:
          E2E_SLEEP_SCALE: "2"
        run: |
          npm run preview &
          for i in $(seq 1 60); do curl -sf http://localhost:4173/ >/dev/null && break; sleep 0.5; done
          curl -sf http://localhost:4173/ >/dev/null || { echo "::error::vite preview không lên sau 30s"; exit 1; }
          node scripts/e2e-ui.mjs "$RUNNER_TEMP/e2e-ui.png"

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: app/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
